body:
  text: 地藏菩薩十齋日整理者張總題解地藏菩薩十齋日又名玄奘法師禮拜逐月有十齋日每月有十齋日大乘四大齋日中國人所撰佛典作者不詳一卷本文獻乃敦煌遺書中很短小的一類寫本嚴格地說它並不屬於佛藏經律論的任何一個部分只是僧俗佛事活動所使用的一種齋儀其內容敘述在每月的十個特定的日子中有哪些天神下界巡檢在這些日子中應念誦哪些佛菩薩之名如此稱名持齋可不墮何種地獄以及可免罪多少劫此經雖小但在古代社會中廣泛流傳並曾起過重要的作用大足石窟寶頂大佛灣著名的第號地藏十王地獄變中極關鍵之十地獄部分所刻的銘記就是此地藏菩薩十齋日至少也是以此為來源的敦煌遺書中此類寫本甚多根據目前掌握的情況連同兩個藏文本總數可達十七號加上大足石刻本則總計為十八種法國學者蘇遠鳴曾對敦煌遺書中的地藏菩薩十齋日作了非常認真的研究但只羅列了十一號寫本且未注意到此經在石窟造像中的存在也沒有按類型模式分析該文獻諸異本之間的關係根據筆者最近研究該齋儀雖然極為簡短但在流傳過程中出現多種異本變化繁雜並因其表現形式不同共出現四種不同的標題即玄奘法師禮拜逐月有十齋日每月有十齋日地藏菩薩十齋日大乘四大齋日整理本根據不同標題乃至諸種文本內容的不同將包括石刻本在內的諸種文本分為六個系統八個異本這對研究該文獻的形成及演變以及同類齋儀在流傳過程中的演變想必能起到一定的作用本文獻未為中國歷代大藏經所收亦未為歷代經錄所著錄日本大正藏第卷曾依據敦煌遺書錄文但因所依據僅斯號一號故未能反映該文獻的全貌在此將諸異本分別錄校整理整理本的底校本情況如下第一系統錄文一底本北京大學圖書館號無校本該本形式最為簡單從中可見某日某某神下模式斯號與伯號大乘四大齋日之中也含有此種模式但內容與北京大學此本有不同故不作為校本處理第二系統錄文二底本斯號無校本錄文三底本伯號校本甲斯號斯號與伯號原為同卷後被撕裂分藏所抄為佛說金剛經纂其中斯號抄錄部分錄有地藏十齋日的內容今將這一部分作為校本詳可參見藏外佛教文獻第一輯所載佛說金剛經纂第三系統錄文四底本上海博物館第號校本甲斯號校本乙斯號錄文五底本斯號無校本斯號雖與錄文四形式較近但每句後面多出一些禁除感官之欲及除罪數劫的辭句是比較特殊的一本應予注意第四系統錄文六底本斯號校本甲伯號校本乙斯號尾缺校本丙斯號校本丁北圖發七號此外法國藏號為藏文本英國藏為古藏文音譯本這兩種寫本也應屬於這一異本系統此次未參校第五系統錄文七底本斯號校本甲伯號第六系統錄文八底本大足寶頂第號中石刻本無校本除了上述諸本之外敦煌遺書種還有若干與本文獻相關的資料如斯號與斯號形態與地藏菩薩十齋日不同故不作為參校本詳情請參見附文關於地藏菩薩十齋日錄文一月一日童子下八日太子下十四日伺命下十五日五道大神下十八日閻羅王下二十三日大將軍下二十四日歲命稽二十八日太山府君下二十九日四天王下三十日梵天王下錄文完
